service: brain
image: <%= ENV['IMAGE_REPOSITORY'] %>

servers:
  web:
    hosts:
      - <%= ENV['SERVER_IP'] %>

proxy:
  ssl:
    certificate_pem: CERTIFICATE_PEM
    private_key_pem: PRIVATE_KEY_PEM
  hosts:
    - <%= ENV['BRAIN_DOMAIN'] %>
    - <%= ENV['PREVIEW_DOMAIN'] %>
  app_port: 8080
  healthcheck:
    path: /health
    interval: 2
    timeout: 5

deploy_timeout: 180

registry:
  server: ghcr.io
  username: <%= ENV['REGISTRY_USERNAME'] %>
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64

env:
  clear:
    NODE_ENV: production
  secret:
    - AI_API_KEY
    - GIT_SYNC_TOKEN
    - MCP_AUTH_TOKEN
    - DISCORD_BOT_TOKEN
    - A2A_TOKEN_PHONEY
    - A2A_OUTBOUND_TOKEN_PHONEY
    - LINKEDIN_ACCESS_TOKEN
    - BUTTONDOWN_API_KEY
    - CLOUDFLARE_ACCOUNT_ID
    - CLOUDFLARE_API_TOKEN
    - CLOUDFLARE_ANALYTICS_SITE_TAG

volumes:
  - /opt/brain-data:/app/brain-data
  - /opt/brain-state:/data
  - /opt/brain-config:/config
  - /opt/brain-dist:/app/dist
  - /opt/brain.yaml:/app/brain.yaml
