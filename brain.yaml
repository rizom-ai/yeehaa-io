brain: rover
domain: yeehaa.io

# Plugin preset — "core" is the minimal on-ramp. Use "default" or "full"
# for richer presets, or list capability ids in add: / remove: to fine-tune.
preset: full

# Keep current yeehaa.io site package. Local src/theme.css now provides the
# theme via the standalone convention.
site:
  package: "@brains/site-yeehaa"

# Permissions
anchors:
  - "discord:1442828818493735015"

# Plugin config
plugins:
  directory-sync:
    git:
      repo: rizom-ai/professional-brain-content
      authToken: ${GIT_SYNC_TOKEN}
      authorName: Yeehaa
      authorEmail: yeehaa@rizom.ai
  mcp:
    authToken: ${MCP_AUTH_TOKEN}
  a2a:
    trustedTokens:
      ${A2A_TOKEN_PHONEY}: mylittlephoney
    outboundTokens:
      mylittlephoney.com: ${A2A_OUTBOUND_TOKEN_PHONEY}
  discord:
    botToken: ${DISCORD_BOT_TOKEN}
  social-media:
    linkedin:
      accessToken: ${LINKEDIN_ACCESS_TOKEN}
  newsletter:
    apiKey: ${BUTTONDOWN_API_KEY}
  analytics:
    cloudflare:
      accountId: ${CLOUDFLARE_ACCOUNT_ID}
      apiToken: ${CLOUDFLARE_API_TOKEN}
      siteTag: ${CLOUDFLARE_ANALYTICS_SITE_TAG}
permissions:
  rules:
    - pattern: "a2a:mylittlephoney"
      level: trusted
    - pattern: "a2a:*"
      level: public
