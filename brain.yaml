brain: rover
domain: yeehaa.io

# Plugin preset — "core" is the minimal on-ramp. Use "default" or "full"
# for richer presets, or list capability ids in add: / remove: to fine-tune.
preset: full
add:
  - rizom-ecosystem

# Local src/site.ts and src/theme.css provide the site and theme via the
# standalone conventions.

# Permissions
anchors:
  - "discord:1442828818493735015"

# Plugin config
plugins:
  mcp:
    mode: debug
  auth-service:
    setupEmail: ${SETUP_EMAIL_TO}
  email-resend:
    apiKey: ${SETUP_EMAIL_API_KEY}
    from: ${SETUP_EMAIL_FROM}
  cms:
    passkeyLogin:
      contentRepoToken: ${CMS_CONTENT_REPO_PAT}
  directory-sync:
    git:
      repo: rizom-ai/professional-brain-content
      authToken: ${GIT_SYNC_TOKEN}
      authorName: Yeehaa
      authorEmail: yeehaa@rizom.ai
  discord:
    botToken: ${DISCORD_BOT_TOKEN}
  social-media:
    linkedin:
      accessToken: ${LINKEDIN_ACCESS_TOKEN}
  newsletter:
    apiKey: ${BUTTONDOWN_API_KEY}
  analytics:
    cloudflare:
      accountId: ${CLOUDFLARE_ACCOUNT_ID}
      apiToken: ${CLOUDFLARE_API_TOKEN}
      siteTag: ${CLOUDFLARE_ANALYTICS_SITE_TAG}
permissions:
  rules:
    - pattern: "a2a:*"
      level: public
